<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌈 Tebak Warna Premium</title>

<style>
body{
background:linear-gradient(to bottom,#2b003d,#d89bc6);
color:white;
font-family:Arial;
text-align:center;
min-height:100vh;
}

.box{
margin:40px auto;
width:320px;
padding:30px;
background:rgba(255,255,255,0.15);
border-radius:30px;
box-shadow:0 0 20px pink;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:20px;
background:#ff66b3;
color:white;
margin:10px;
box-shadow:0 0 15px pink;
}

#warna{
font-size:50px;
margin:20px;
}
</style>
</head>

<body>

<div class="box">
<h1>🌈 Tebak Warna Premium</h1>

<h2 id="warna">🟥</h2>

<button onclick="tebak('Merah')">Merah</button>
<button onclick="tebak('Biru')">Biru</button>
<button onclick="tebak('Hijau')">Hijau</button>

<h2 id="hasil"></h2>

<a href="/">
<button>🏠 Beranda</button>
</a>

</div>

<script>
let jawaban = "Merah";

function tebak(pilih){
if(pilih==jawaban){
document.getElementById("hasil").innerHTML="🎉 Benar!";
}
else{
document.getElementById("hasil").innerHTML="❌ Salah!";
}
}
</script>

</body>
</html>
